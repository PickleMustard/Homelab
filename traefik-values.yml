additionalArguments:
  - "--serversTransport.insecureSkipVerify=true"
  - "--log.level=INFO"

# Access Logs Configuration - Request Tracing & Header Capture
logs:
  general:
    format: json
    level: TRACE

  access:
    enabled: true
    format: json
    bufferingSize: 100
    addInternals: true
    fields:
      general:
        defaultMode: keep
        names:
          StartUTC: drop
          ClientUsername: drop
      headers:
        defaultMode: keep
        names:
          User-Agent: keep
          X-Forwarded-For: keep
          X-Forwarded-Proto: keep
          X-Forwarded-Host: keep
          X-Real-IP: keep
          X-Request-ID: keep
          Content-Type: keep
          Accept: keep
          Authorization: keep
          X-Forwarded-Method: keep


deployment:
  enabled: true
  replicas: 1

ingressClass:
  enabled: true
  isDefaultClass: true
  name: "traefik"

tlsStore:
  default:
    defaultCertificate: 
      secretName: picklemustard-dev-tls
ports:
  ldap:
    port: 3890
    exposedPort: 3890
    expose:
      default: true
    protocol: TCP

  auth:
    port: 9091
    exposedPort: 9091
    expose:
      default: true
    protocol: TCP
    forwardedHeaders:
      trustedIPs:
        - 192.168.200.200
      insecure: true
    proxyProtocol:
      insecure: true

  postgres:
    port: 5432
    exposedPort: 5432
    expose:
      default: true
    protocol: TCP

  minecraft:
    port: 25565
    exposedPort: 25565
    expose:
      default: true
    protocol: TCP

  smtp:
    port: 25
    exposedPort: 25
    expose:
      default: true
    protocol: TCP

  imap:
    port: 143
    exposedPort: 143
    expose:
      default: true
    protocol: TCP

  imaps:
    port: 993
    exposedPort: 993
    expose:
      default: true
    protocol: TCP

  pop3:
    port: 110
    exposedPort: 110
    expose:
      default: true
    protocol: TCP

  pop3s:
    port: 995
    exposedPort: 995
    expose:
      default: true
    protocol: TCP

  sieve:
    port: 4190
    exposedPort: 4190
    expose:
      default: true
    protocol: TCP

  submission:
    port: 587 
    exposedPort: 10587
    expose:
      default: true
    protocol: TCP

  submissions:
    port: 465
    exposedPort: 10465
    expose:
      default: true
    protocol: TCP

  web:
    port: 80
    forwardedHeaders:
      trustedIPs:
        - 192.168.200.200
      insecure: true
    proxyProtocol:
      insecure: true

  ssh-git:
    port: 22
    exposedPort: 2222
    expose:
      default: true
    protocol: TCP
    forwardedHeaders:
      trustedIPs:
        - 192.168.200.200
      insecure: true

gateway:
  enabled: true
  name: "traefik-gateway"
  listeners:
    web:
      port: 8000
      protocol: HTTP
    ldap:
      port: 3890
      protocol: TCP
      
ingressRoute:
  dashboard:
    enabled: true
    matchRule: "Host(`traefik-kube.picklemustard.dev`) && (PathPrefix(`/dashboard`) || PathPrefix(`/api`))"
    services:
      - name: api@internal
        kind: TraefikService
    entryPoints: ["web", "websecure"]

providers:
  kubernetesCRD:
    enabled: true
    allowCrossNamespace: true
  kubernetesIngress:
    enabled: true

rbac:
  enabled: true

service:
  enabled: true
  type: LoadBalancer
  spec:
    loadBalancerIP: 192.168.1.142 # this should be an IP in the MetalLB range
