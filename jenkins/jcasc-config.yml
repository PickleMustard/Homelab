apiVersion: v1
kind: ConfigMap
metadata:
  name: jenkins-jcasc-config
  namespace: jenkins
  labels:
    app.kubernetes.io/name: jenkins
    app.kubernetes.io/instance: jenkins
data:
  jcasc-config.yml: |
    jenkins:
      systemMessage: "Jenkins CI/CD for Forgejo"
      numExecutors: 2
      mode: NORMAL
      labelString: ""
      globalNodeProperties:
        - envVars:
            env:
              - key: "JENKINS_ENV"
                value: "k3s"
      securityRealm:
        ldap:
          configurations:
            - server: ldap://lldap-service.auth.svc.cluster.local:3890
              rootDN: dc=andromeda,dc=picklemustard,dc=dev
              managerDN: ${LDAP_BIND_DN}
              managerPasswordSecret: ${LDAP_BIND_PASSWORD}
              userSearchBase: ""
              userSearch: uid={0}
              groupSearchBase: ou=groups,dc=andromeda,dc=picklemustard,dc=dev
              groupSearchFilter: "(&(objectClass=group)(memberUid={0}))"
          cache:
            size: 100
            ttl: 300
      authorizationStrategy:
        loggedInUsersCanDoAnything:
          allowAnonymousRead: false
      clouds:
        - kubernetes:
            name: "kubernetes"
            serverUrl: "https://kubernetes.default"
            namespace: "jenkins"
            jenkinsUrl: "http://jenkins.jenkins.svc.cluster.local:8080/tools/jenkins/"
            jenkinsTunnel: "jenkins.jenkins.svc.cluster.local:50000"
            skipTlsVerify: true
            maxRequestsPerHostStr: "32"
            retentionTimeout: 15
            connectTimeout: 0
            readTimeout: 0
            podLabels:
              - key: "app.kubernetes.io/name"
                value: "jenkins-agent"
              - key: "app.kubernetes.io/instance"
                value: "jenkins"
            templates:
              - name: "default-agent"
                label: "default"
                serviceAccount: "jenkins-controller"
                namespace: "jenkins"
                nodeUsageMode: "NORMAL"
                idleMinutes: 1
                activeDeadlineSeconds: 1200
                slaveConnectTimeoutStr: "60"
                containers:
                  - name: "jnlp"
                    image: "jenkins/inbound-agent:latest"
                    alwaysPullImage: false
                    workingDir: "/home/jenkins/agent"
                    ttyEnabled: true
                    resourceRequestCpu: "250m"
                    resourceRequestMemory: "256Mi"
                    resourceLimitCpu: "500m"
                    resourceLimitMemory: "512Mi"
    unclassified:
      location:
        url: "https://andromeda.picklemustard.dev/tools/jenkins"
